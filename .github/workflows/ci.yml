name: ci

on:
  push:
  pull_request:

jobs:
  # Fast, no-Docker gate: the nginx-free engine + its tests.
  core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: core unit tests
        run: cd src/pow-gate-core && cargo test --locked || cargo test
      - name: e2e client compiles
        run: cd tests/integration && cargo build --locked || cargo build

  # Build the module against a pinned nginx and verify it loads + parses.
  module:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: build module .so (compiles the FFI shell against nginx)
        run: docker build -f docker/Dockerfile --target module-build .
      - name: nginx -t smoke (module loads, directives parse)
        run: docker build -f docker/Dockerfile --target nginx-smoke .

  # Live black-box handshake: challenge → solve → verify → cleared.
  e2e:
    runs-on: ubuntu-latest
    needs: [core, module]
    steps:
      - uses: actions/checkout@v5
      - name: run end-to-end
        run: |
          docker compose -f docker-compose.test.yml up --build \
            --abort-on-container-exit --exit-code-from e2e
