name: ci

on:
  push:
  pull_request:

jobs:
  # Fast, no-Docker gate: the nginx-free engine + its tests.
  core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: core unit tests
        run: cd src/pow-gate-core && cargo test --locked || cargo test
      - name: e2e client compiles
        run: cd tests/integration && cargo build --locked || cargo build

  # Build the module against a pinned nginx and verify it loads + parses, across
  # the full matrix: {Debian trixie glibc, Alpine musl} × {amd64, arm64}. Each
  # cell builds NATIVELY on its own runner (no QEMU) — the digest-pinned base
  # images are multi-arch indexes, so the same FROM resolves to the runner's arch.
  module:
    runs-on: ${{ matrix.runner }}
    # Surfaced as env so the login step's `if:` can read it (the `secrets` context
    # is not available in step `if`). Optional: without the secrets the step is
    # skipped and pulls stay anonymous.
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
    strategy:
      fail-fast: false
      matrix:
        libc: [debian, alpine]
        arch: [amd64, arm64]
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v5
      - name: log in to Docker Hub (avoids anonymous pull rate limits)
        if: env.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: build module .so (${{ matrix.libc }}/${{ matrix.arch }})
        run: docker build -f docker/Dockerfile --target module-build-${{ matrix.libc }} .
      - name: nginx -t smoke (${{ matrix.libc }}/${{ matrix.arch }} — module loads, directives parse)
        run: docker build -f docker/Dockerfile --target nginx-smoke-${{ matrix.libc }} .

  # Live black-box handshake: challenge → solve → verify → cleared, per libc AND
  # arch — covers musl-specific FFI (sockaddr/body/DNS) and arch-specific codegen.
  e2e:
    runs-on: ${{ matrix.runner }}
    needs: [core, module]
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
    strategy:
      fail-fast: false
      matrix:
        libc: [debian, alpine]
        arch: [amd64, arm64]
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v5
      - name: log in to Docker Hub (avoids anonymous pull rate limits)
        if: env.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: run end-to-end (${{ matrix.libc }}/${{ matrix.arch }})
        env:
          SMOKE_TARGET: nginx-smoke-${{ matrix.libc }}
        run: |
          docker compose -f docker-compose.test.yml up --build \
            --abort-on-container-exit --exit-code-from e2e
