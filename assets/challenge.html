<!doctype html>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Checking your browser…</title>

<!--
  CUSTOMIZE FREELY. The module only requires these hook IDs to exist; the
  solver at {{endpoint}}solver.js drives them as the proof-of-work runs:

    #pow-status    text element  — status messages ("Verifying…", "Done")
    #pow-progress  <progress>    — value 0..100 (or set style.width yourself)
    #pow-percent   text element  — numeric percent
    #pow-error     element       — shown if verification fails

  Template placeholders filled in by the module before serving:
    {{difficulty}}  — configured PoW difficulty
    {{endpoint}}    — internal route prefix (default "/.pow/")

  THEME: this default page follows the system/browser light/dark preference
  (prefers-color-scheme) and adds a switcher (top right) that cycles
  Auto → Light → Dark, persisted in localStorage. Everything else — markup, CSS,
  logo, copy, animation — is yours to change.
-->

<!-- Apply a saved theme before first paint to avoid a flash of the wrong colors. -->
<script>
  try {
    var t = localStorage.getItem('pow-theme');
    if (t === 'light' || t === 'dark') document.documentElement.setAttribute('data-theme', t);
  } catch (e) {}
</script>

<style>
  /* LIGHT palette is the base; DARK is applied when the system prefers dark
     (and the user hasn't forced light), or when data-theme="dark" is set. */
  :root {
    color-scheme: light dark;
    --bg:     #f6f7f9;
    --card:   #ffffff;
    --fg:     #1b1f27;
    --muted:  #5b6270;
    --accent: #2f6df6;
    --track:  #e3e7ee;
    --err:    #c0392b;
    --radius: 14px;
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --bg:     #0f1117;
      --card:   #171a22;
      --fg:     #e6e8ee;
      --muted:  #8b91a1;
      --accent: #6ea8fe;
      --track:  #2a2f3a;
      --err:    #ff8a8a;
    }
  }
  :root[data-theme="dark"] {
    color-scheme: dark;
    --bg:     #0f1117;
    --card:   #171a22;
    --fg:     #e6e8ee;
    --muted:  #8b91a1;
    --accent: #6ea8fe;
    --track:  #2a2f3a;
    --err:    #ff8a8a;
  }
  :root[data-theme="light"] { color-scheme: light; }

  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100dvh; display: grid; place-items: center;
    background: var(--bg); color: var(--fg);
    font: 15px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    transition: background .2s, color .2s;
  }
  .card {
    width: min(92vw, 420px); padding: 32px 28px; text-align: center;
    background: var(--card); border-radius: var(--radius);
    box-shadow: 0 12px 40px rgba(0,0,0,.18);
  }
  .logo { font-weight: 700; letter-spacing: .02em; margin-bottom: 18px; }
  h1 { font-size: 1.15rem; margin: 0 0 6px; }
  p.sub { color: var(--muted); margin: 0 0 22px; }

  /* Progress UI — restyle however you like */
  progress {
    appearance: none; width: 100%; height: 10px; border: 0;
    border-radius: 999px; overflow: hidden; background: var(--track);
  }
  progress::-webkit-progress-bar { background: var(--track); }
  progress::-webkit-progress-value,
  progress::-moz-progress-bar { background: var(--accent); transition: width .15s; }

  .meta { display: flex; justify-content: space-between;
          color: var(--muted); font-size: .85rem; margin-top: 10px; }
  #pow-error { display: none; margin-top: 16px; color: var(--err); font-size: .9rem; }
  .foot { margin-top: 24px; color: var(--muted); font-size: .8rem; }
  noscript { color: var(--err); }

  /* Theme switcher, top right */
  .theme-toggle {
    position: fixed; top: 14px; right: 14px;
    width: 38px; height: 38px; display: grid; place-items: center;
    border: 1px solid var(--track); border-radius: 10px;
    background: var(--card); color: var(--fg); cursor: pointer;
    font-size: 16px; line-height: 1; box-shadow: 0 2px 10px rgba(0,0,0,.18);
    transition: border-color .15s, background .2s;
  }
  .theme-toggle:hover { border-color: var(--accent); }
  .theme-toggle:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
</style>
</head>

<body>
  <button id="theme-toggle" class="theme-toggle" type="button"
          aria-label="Color theme: auto (click to change)" title="Theme: auto">
    <span id="theme-icon" aria-hidden="true">🖥️</span>
  </button>

  <main class="card" role="status" aria-live="polite">
    <div class="logo">🛡️ example.com</div>
    <h1 data-i18n="heading">Just a moment…</h1>
    <p class="sub" data-i18n="sub">Your browser is completing a quick automatic check.</p>

    <progress id="pow-progress" max="100" value="0"></progress>
    <div class="meta">
      <span id="pow-status" data-i18n="preparing">Preparing…</span>
      <span><span id="pow-percent">0</span>%</span>
    </div>

    <div id="pow-error">
      <span data-i18n="error_failed">Verification failed.</span>
      <a href="" onclick="location.reload();return false;" data-i18n="retry">Try again</a>.
    </div>

    <p class="foot" data-i18n="foot">This takes a few seconds and runs entirely in your browser.</p>
    <noscript>JavaScript is required to complete this check.</noscript>
  </main>

  <!-- Theme switcher: cycles Auto → Light → Dark, persisted. Independent of the
       solver; pure presentation, safe to remove or restyle. -->
  <script>
    (function () {
      var root = document.documentElement;
      var btn  = document.getElementById('theme-toggle');
      var icon = document.getElementById('theme-icon');
      var modes = ['auto', 'light', 'dark'];
      var glyph = { auto: '🖥️', light: '☀️', dark: '🌙' };

      var saved = null;
      try { saved = localStorage.getItem('pow-theme'); } catch (e) {}
      var current = modes.indexOf(saved) >= 0 ? saved : 'auto';

      function apply(mode) {
        if (mode === 'auto') root.removeAttribute('data-theme');
        else root.setAttribute('data-theme', mode);
        icon.textContent = glyph[mode];
        btn.title = 'Theme: ' + mode;
        btn.setAttribute('aria-label', 'Color theme: ' + mode + ' (click to change)');
      }
      apply(current);

      btn.addEventListener('click', function () {
        current = modes[(modes.indexOf(current) + 1) % modes.length];
        try { localStorage.setItem('pow-theme', current); } catch (e) {}
        apply(current);
      });
    })();
  </script>

  <!-- i18n: localize the static page copy from the detected language. Runs at
       end of body so the elements above already exist. The solver localizes its
       own live status messages from the same window.__POW_I18N__. -->
  <script>
    (function () {
      var t = window.__POW_I18N__ || {};
      if (t.title) document.title = t.title;
      var nodes = document.querySelectorAll('[data-i18n]');
      for (var i = 0; i < nodes.length; i++) {
        var key = nodes[i].getAttribute('data-i18n');
        if (t[key]) nodes[i].textContent = t[key];
      }
    })();
  </script>

  <!-- The module serves the solver (keypair gen, PoW loop in a Web Worker,
       per-request proof signing). It reads difficulty/endpoint from data-attrs
       and updates the hook IDs above, then reloads on success. -->
  <script src="{{endpoint}}solver.js"
          data-difficulty="{{difficulty}}"
          data-endpoint="{{endpoint}}"
          defer></script>
</body>
</html>
