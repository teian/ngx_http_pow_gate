# Minimal nginx config for the test pipeline: loads the module, registers every
# directive, and gates a location backed by a tiny stub upstream. Used by
# `nginx -t` (smoke) and the e2e client (live handshake).

load_module modules/ngx_http_pow_gate_module.so;

events {}

http {
    pow_gate_hmac_key_file /etc/pow/hmac.key;
    pow_gate_difficulty    2000;     # low so the e2e client solves fast
    pow_gate_clearance_ttl 12h;
    pow_gate_proof_skew    30s;
    pow_gate_endpoint      /.pow/;

    # exercise cookie directives so they parse in `nginx -t`
    pow_gate_cookie_name     pow_clearance;
    pow_gate_cookie_samesite Lax;
    pow_gate_cookie_secure   off;     # plain HTTP in the test harness
    pow_gate_cookie_httponly on;

    # Good-bot verifier: fetches an IP-range feed served by this same nginx
    # (loopback), so the e2e test exercises the verifier without external network.
    # The feed contains 0.0.0.0/0, so any client IP is "in range".
    pow_gate_verifier test {
        ip_ranges_url     http://127.0.0.1:8080/ranges.json;
        ip_ranges_refresh 1h;
        fcrdns_suffix     .example-bot.invalid;
        fcrdns_ttl        1h;
    }

    geo $pow_trusted {
        default 0;
    }
    map $http_user_agent $pow_decision {
        default              challenge;
        ~*verifierbot        verify:test;
    }

    server {
        listen 8080;
        server_name _;

        # The "upstream" is a static file served in the CONTENT phase (after the
        # ACCESS phase, where the gate runs). NOTE: `return`/`rewrite` run in the
        # REWRITE phase — *before* ACCESS — so they'd bypass the gate; that is why
        # this serves a file, not `return 200`.
        location / {
            pow_gate          on;
            pow_gate_trusted  $pow_trusted;
            pow_gate_decision $pow_decision;
            root  /var/www;
            index index.html;
            try_files /index.html =404;
        }

        # excluded path — must never be challenged (gate off → handler declines)
        location = /healthz {
            pow_gate off;
            root  /var/www;
            try_files /healthz.txt =404;
        }

        # IP-range feed for the verifier (gate off so the refresher can fetch it)
        location = /ranges.json {
            pow_gate off;
            root  /var/www;
            try_files /ranges.json =404;
            types { } default_type application/json;
        }
    }
}
