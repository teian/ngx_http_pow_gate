load_module modules/ngx_http_pow_gate_module.so;

http {
    # ───────── core PoW settings (main/server/location, inheritable) ─────────
    pow_gate_hmac_key_file  /etc/pow/hmac.key;   # the one server secret
    pow_gate_difficulty     50000;               # ~expected hashes per solve
    pow_gate_clearance_ttl  12h;                 # how long a clearance lasts (=cookie Max-Age); default 12h
    pow_gate_proof_skew     5s;                  # per-request proof validity
    pow_gate_endpoint       /.pow/;              # internal challenge/verify/solver routes

    # ───────── clearance-cookie attributes (all optional; defaults shown) ─────
    # pow_gate_cookie_name      pow_clearance;   # cookie name
    # pow_gate_cookie_domain    .example.com;    # unset = host-only; set to share across subdomains
    # pow_gate_cookie_path      /;               # cookie Path=
    # pow_gate_cookie_samesite  Lax;             # Lax | Strict | None (None forces Secure)
    # pow_gate_cookie_secure    on;              # Secure flag (HTTPS only)
    # pow_gate_cookie_httponly  on;              # HttpOnly flag (hide from JS)

    # ───────── verified good-bot allowlist (not expressible in stock nginx) ──
    # A block directive: fetches official IP-range JSON + does FCrDNS, cached.
    pow_gate_verifier search_engines {
        ip_ranges_url      https://developers.google.com/static/crawling/ipranges/common-crawlers.json;
        ip_ranges_url      https://developers.google.com/static/crawling/ipranges/special-crawlers.json;
        ip_ranges_url      https://www.bing.com/toolbox/bingbot.json;
        ip_ranges_refresh  12h;
        fcrdns_suffix      .googlebot.com .google.com .search.msn.com .applebot.apple.com;
        fcrdns_ttl         1h;
    }

    # ───────── decisions, using nginx's NATIVE matching engines ──────────────
    # Trusted networks via the built-in geo module (best for IP RANGES — the only
    # stock matcher that understands CIDR). $pow_trusted == "1" => skip the gate.
    geo $pow_trusted {
        default         0;
        10.0.0.0/8      1;
        172.16.0.0/12   1;
        192.168.0.0/16  1;
    }

    # ── ALTERNATIVE: map (pick ONE source for $pow_trusted; geo above OR a map) ──
    # map has no CIDR — use it when trust is NOT an IP range. Output must be 1/0.
    #
    #   # mTLS client certificate:
    #   map $ssl_client_verify $pow_trusted { default 0; SUCCESS 1; }
    #
    #   # internal header / API token:
    #   map $http_x_internal_token $pow_trusted { default 0; "s3cr3t-xyz" 1; }
    #
    #   # a few exact IPs (no ranges):
    #   map $remote_addr $pow_trusted { default 0; 203.0.113.5 1; 198.51.100.7 1; }

    # User-Agent classification via the built-in map module.
    # Values the module understands: allow | deny | challenge | verify:<name>
    map $http_user_agent $pow_decision {
        default                                       challenge;
        ~*(gptbot|ccbot|bytespider|claudebot|amazonbot)   deny;
        ~*(googlebot|bingbot|duckduckbot|applebot)        verify:search_engines;
        ~*Mozilla                                     challenge;
        ""                                            challenge;   # no UA at all
    }

    server {
        listen 443 ssl;
        server_name example.com;

        # IMPORTANT: behind a load balancer, make $remote_addr the real client.
        # set_real_ip_from 10.0.0.0/8;  real_ip_header X-Forwarded-For;

        location / {
            pow_gate           on;
            pow_gate_trusted   $pow_trusted;   # non-zero => allow, skip the gate
            pow_gate_decision  $pow_decision;  # allow|deny|challenge|verify:<name>

            # The challenge PAGE is embedded; omit pow_gate_page to use the
            # built-in default. Set a path only to override it. (The SOLVER is
            # always served by the module — not configurable.)
            pow_gate_page      /etc/pow/challenge.html;   # custom page (else built-in)

            proxy_pass http://backend;
        }

        # ───────── path exclusions: the idiomatic nginx way ─────────
        # Just turn the gate off in the location. No special syntax to learn.
        location = /robots.txt   { pow_gate off; proxy_pass http://backend; }
        location = /favicon.ico  { pow_gate off; proxy_pass http://backend; }
        location ^~ /.well-known/ { pow_gate off; proxy_pass http://backend; }

        # Credentialed automation: gate off (key validated by the upstream).
        location ^~ /api/ { pow_gate off; proxy_pass http://backend; }
    }
}
